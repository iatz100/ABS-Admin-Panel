<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#f5f7fa;
    color:#2c3e50;
    text-align:center;
    padding:20px;
}

.box{
    max-width:420px;
}

.icon{
    font-size:70px;
    margin-bottom:20px;
}

h1{
    font-size:28px;
    margin-bottom:12px;
}

p{
    font-size:16px;
    color:#666;
    line-height:1.6;
    margin-bottom:25px;
}

button{
    background:#2ecc71;
    color:#fff;
    border:none;
    padding:12px 30px;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#27ae60;
}
</style>
</head>

<body>

<div class="box">
    <div class="icon">📡</div>

    <h1>You're Offline</h1>

    <p>
        Internet connection is not available.<br>
        Please reconnect and try again.
    </p>

    <button onclick="location.reload()">
        🔄 Try Again
    </button>
</div>

</body>
</html>
